name: Codyssey registry-backed collection v5.3.2

on:
  workflow_dispatch:
  schedule:
    - cron: "30 13 * * 0"

jobs:
  collect-v5-3-2:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 레포 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 의존성 설치
        run: pip install requests google-generativeai

      - name: registry 기반 수집 실행 v5.3.2
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ENABLE_GLOBAL_DISCOVERY: "0"
        run: |
          cd codyssey-tracker
          python collect_v5_3_2.py

      - name: 보고서/상태 파일 커밋 및 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add codyssey-tracker/reports_v5_3_2/ codyssey-tracker/state/
          git diff --staged --quiet || git commit -m "📚 Codyssey registry-backed collection v5.3.2: $(TZ='Asia/Seoul' date +'%Y-%m-%d')"
          git push
