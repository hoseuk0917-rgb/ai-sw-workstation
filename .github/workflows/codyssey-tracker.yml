name: Codyssey Tracker

on:
  workflow_dispatch:
  schedule:
    # Sunday 21:00 KST = Sunday 12:00 UTC
    - cron: "0 12 * * 0"

permissions:
  contents: write

concurrency:
  group: codyssey-tracker
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests google-generativeai google-genai
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f codyssey-tracker/requirements.txt ]; then pip install -r codyssey-tracker/requirements.txt; fi
      - name: Run collector
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python ./codyssey-tracker/collect_v5_3_2.py

      - name: Show latest outputs
        run: |
          ls -lah ./codyssey-tracker/reports_v5_3_2 || true
          test -f ./codyssey-tracker/reports_v5_3_2/latest.md && head -n 30 ./codyssey-tracker/reports_v5_3_2/latest.md || true

      - name: Commit updated tracker outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            ./codyssey-tracker/state/*.json \
            ./codyssey-tracker/reports_v5_3_2/*.md \
            ./codyssey-tracker/reports_v5_3_2/*.json \
            ./codyssey-tracker/reports_v5_3_2/*.tsv || true

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore: refresh codyssey tracker outputs"
          git push
