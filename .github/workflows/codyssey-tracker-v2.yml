name: Codyssey 과정 분리형 수집 v2

on:
  workflow_dispatch:
  schedule:
    - cron: "10 12 * * 0"

jobs:
  collect-v2:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 레포 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 의존성 설치
        run: pip install requests google-generativeai

      - name: 과정 분리형 수집 실행
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ENABLE_GLOBAL_DISCOVERY: "0"
        run: |
          cd codyssey-tracker
          python collect_v2.py

      - name: 보고서 커밋 및 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add codyssey-tracker/reports_v2/
          git diff --staged --quiet || git commit -m "📚 Codyssey 과정 분리형 수집 v2: $(TZ='Asia/Seoul' date +'%Y-%m-%d')"
          git push
